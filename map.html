<header class="site-header">
  <div class="header-inner">
    <nav class="nav-bar">

    </nav>
    <h1 class="site-title">北京市城镇住房建设 · 时空间分布</h1>
    <p class="site-subtitle">各行政区不同建设年代城镇住宅的套数与建筑面积时空间分布</p>
  </div>
</header>

<main class="main-content">
  <!-- Controls -->
  <section class="controls-section">
    <div class="control-group">
      <label class="control-label">展示指标</label>
      <div class="toggle-group" id="metricToggle">
        <button class="toggle-btn active" data-metric="units">住宅套数</button>
        <button class="toggle-btn" data-metric="area">建筑面积</button>
        <button class="toggle-btn" data-metric="avgArea">套均面积</button>
      </div>
    </div>
    <div class="control-group">
      <label class="control-label">时间粒度</label>
      <div class="toggle-group" id="granularityToggle">
        <button class="toggle-btn active" data-granularity="yearly">单年</button>
        <button class="toggle-btn" data-granularity="fiveYear">五年汇总</button>
      </div>
    </div>
    <div class="control-group year-control">
      <label class="control-label">建设年份</label>
      <div class="year-display">
        <span id="yearLabel" class="year-value">全部年份</span>
        <button id="playBtn" class="play-btn" title="播放动画">▶</button>
      </div>
      <div class="slider-wrapper">
        <input type="range" id="yearSlider" min="0" max="72" value="72" class="year-slider">
      </div>
      <div class="slider-labels">
        <span id="sliderLabelStart">早于1949</span>
        <span>全部</span>
      </div>
    </div>
  </section>

  <!-- Map + Sidebar -->
  <section class="map-section">
    <div class="map-container">
      <div id="map"></div>
      <div class="legend" id="legend"></div>
    </div>
    <div class="sidebar" id="sidebar">
      <h3 class="sidebar-title">各区排名</h3>
      <div class="sidebar-metric" id="sidebarMetric">住宅套数</div>
      <div id="rankList" class="rank-list"></div>
    </div>
  </section>
</main>
